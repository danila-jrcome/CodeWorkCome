<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeWorkCome</title>

    <!-- Подключение шрифтов -->
    <link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,200..1000;1,200..1000&display=swap" rel="stylesheet">

    <!-- Подключение иконок -->
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v6.0.0-beta3/css/all.css">

    <!-- Скрываем контент до загрузки -->
    <style>
        :root {
            /* Colors */
            --background:   #2C2C2C;
            --primary:      #355872;
            --second:       #7acece;
            --shadow:       #1f0942;

            --card-bg:      #1d1d1d;
            --col-bor:      #505050;

            --main-text:    #F3F4F4;
            --text-gray:    #d2d8e7;

            --gml-function: #ca8e51;

            --second-dark:  rgb(116, 116, 116);
        }

        body {
            margin: 0;
            min-height: 100vh;

            background: var(--background);
            color: var(--main-text);

            font-family: 'Nunito', sans-serif;
        }
        
        /* Обнуление отступов */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Header */
        header {
            display: flex;
            flex-direction: row;
            flex-wrap:  wrap;
            justify-content: center;
            align-items: center;
            padding: 18px;
            gap: 12px;
            column-gap: 32px;

            background-color: var(--card-bg);

            box-shadow: 0 -5px 10px inset rgba(0, 0, 0, 0.1);
        }

        header h1{
            color: var(--main-text);
        }

        /* Header Description */
        .head-desc {
            padding: 4px 20px;
            border-radius: 30px;
            background: linear-gradient(to right, var(--primary), #338f8f);
            box-shadow: 0 8px 8px rgba(0,0,0,0.1);
            
            width: fit-content
        }

        @media (min-width: 0px) 
        {
            header {
                flex-direction: column;
                font-size: clamp(10px, 2vw, 32px);
            }
        }
        @media (min-width: 850px) {
            header {
                flex-direction: row;
                font-size: 1rem;
            }
        }
    </style>

    <!-- Определение базового пути + Подключение стилей CSS -->
    <script>
        (function() {
            const isGitHubPages = window.location.hostname.includes('github.io');
            // const isLocalServer = window.location.hostname === '127.0.0.1' || window.location.hostname === 'localhost';
            console.log('🌍 Окружение:', isGitHubPages ? 'GitHub Pages' : 'Local Server');
            

            let basePath = '';
            if (isGitHubPages)  { basePath = '/CodeWorkCome'; } 
            else                { basePath = '';}
            window.APP_BASE_PATH = basePath; // Сохраняем в глобальную переменную для script.js
            console.log('📁 Базовый путь:', `"${basePath}"`);
            

            // Подключаем CSS с правильным путем
            const cssFiles = ['style.css', 'blog-page.css', 'gml-highlights.css'];
            cssFiles.forEach(file => 
            {
                const link = document.createElement('link');
                link.rel = 'stylesheet';
                link.href = basePath + '/css/' + file;
                document.head.appendChild(link);
                console.log('✅ Подключен CSS:', basePath + '/css/' + file);
            });
        })();
    </script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
</head>
<body>
    <!-- Шапка -->
    <header>
        <h1>CodeWorkCome</h1>
        <div class="head-desc">
            <h2>Про GameMaker Studio 2</h2>
        </div>
    </header>

    <!-- Контент страницы -->
    <main id="content"><!-- JS скрипт --></main>


    <!-- Подключение скрипта JS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/gml.min.js"></script>
    <script>document.write(`<script src="${window.APP_BASE_PATH}/js/script.js"><\/script>`)</script>
</body>
</html>

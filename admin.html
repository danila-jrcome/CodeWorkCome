<!DOCTYPE html>
<html>
<head>
    <title>Редактор блогов</title>
    <style>
        body { font-family: Arial; padding: 20px; max-width: 800px; margin: 0 auto; }
        textarea { width: 100%; height: 400px; margin: 10px 0; }
        button { padding: 10px 20px; margin: 5px; }
    </style>
</head>
<body>
    <h1>📝 Редактор блогов</h1>
    
    <textarea id="jsonEditor"></textarea>
    
    <button onclick="saveJSON()">💾 Сохранить</button>
    <button onclick="downloadJSON()">📥 Скачать JSON</button>
    <button onclick="uploadJSON()">📤 Загрузить JSON</button>
    
    <script>
        // Загружаем текущий JSON
        fetch('data/blogs.json')
            .then(r => r.json())
            .then(data => {
                document.getElementById('jsonEditor').value = 
                    JSON.stringify(data, null, 2);
            });
        
        function saveJSON() {
            const data = document.getElementById('jsonEditor').value;
            localStorage.setItem('blogs_backup', data);
            alert('Сохранено в localStorage!');
        }
        
        function downloadJSON() {
            const data = document.getElementById('jsonEditor').value;
            const blob = new Blob([data], {type: 'application/json'});
            const url = URL.createObjectURL(blob);
            
            const a = document.createElement('a');
            a.href = url;
            a.download = 'blogs.json';
            a.click();
        }
        
        function uploadJSON() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.json';
            
            input.onchange = e => {
                const file = e.target.files[0];
                const reader = new FileReader();
                reader.onload = () => {
                    document.getElementById('jsonEditor').value = reader.result;
                };
                reader.readAsText(file);
            };
            
            input.click();
        }
    </script>
</body>
</html>
